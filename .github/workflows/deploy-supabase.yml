name: Deploy Supabase (functions + migrations)

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch:

env:
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_PROJECT_ID: byqldosixshhuiuarszp
  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Push database migrations
        run: supabase db push --include-all
        continue-on-error: false

      - name: Deploy edge functions
        run: |
          for fn_dir in supabase/functions/*/; do
            fn_name=$(basename "$fn_dir")
            # pula a pasta _shared (helpers)
            if [ "$fn_name" = "_shared" ]; then continue; fi
            echo "→ Deploying function: $fn_name"
            supabase functions deploy "$fn_name" --project-ref "$SUPABASE_PROJECT_ID"
          done
