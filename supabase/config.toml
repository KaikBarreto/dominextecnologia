project_id = "byqldosixshhuiuarszp"

# self-register: público por design (cadastro de novas empresas)
# O JWT não existe ainda neste fluxo — protegido por validação de campos e (futuramente) CAPTCHA
[functions.self-register]
verify_jwt = false

# generate-pmoc-orders: protegido por CRON_SECRET no header Authorization
[functions.generate-pmoc-orders]
verify_jwt = false

# generate-payroll: protegido por CRON_SECRET no header Authorization
# Gera linhas de Folha de Pagamento em financial_transactions para cada
# funcionário ativo conforme sua frequência (mensal/quinzenal/semanal)
[functions.generate-payroll]
verify_jwt = false

# crm-lead-webhook: protegido por token de webhook na tabela crm_webhooks
[functions.crm-lead-webhook]
verify_jwt = false

# bootstrap-admin: protegido por BOOTSTRAP_SECRET no header x-bootstrap-secret
# Remover esta seção (ou a função) após o setup inicial
[functions.bootstrap-admin]
verify_jwt = false

# admin-token-login: "Token de Acesso" do painel master. A action 'login' NÃO
# manda Authorization (é o fluxo de /auth do usuário-alvo) — por isso verify_jwt
# fica false. A action 'generate' valida o Bearer + has_role 'super_admin' DENTRO
# da função; a action 'login' valida email + token HMAC + rate-limit por IP.
[functions.admin-token-login]
verify_jwt = false

# activate-scheduled-orders: protegido por CRON_SECRET no header Authorization
[functions.activate-scheduled-orders]
verify_jwt = false

# request-password-reset: público (anon pede recuperação por email)
# Requer secrets: RESEND_API_KEY, RESEND_FROM_EMAIL (opcional)
[functions.request-password-reset]
verify_jwt = false

# reset-password-with-code: público (valida código + atualiza senha)
[functions.reset-password-with-code]
verify_jwt = false

# pmoc-portal-share: portal público de unidade (token de 32 hex no query string)
# Validação do token + retorno 404 unificado são feitos dentro da função.
[functions.pmoc-portal-share]
verify_jwt = false

# asaas-webhook: endpoint PÚBLICO chamado pela Asaas (sem JWT).
# FAIL-CLOSED: valida o header asaas-access-token contra ASAAS_WEBHOOK_TOKEN
# (timing-safe) dentro da função. Sem o secret setado → 401 sempre.
[functions.asaas-webhook]
verify_jwt = false

# backfill-asaas-customers: provisiona customer Asaas para empresas sem
# asaas_customer_id. Autentica DENTRO da função por super_admin (Bearer JWT)
# OU header x-cron-secret == CRON_SECRET (chamada do cron pg_cron como postgres).
# verify_jwt=false porque o cron manda o secret no x-cron-secret, não um JWT —
# com verify_jwt=true o gateway rejeitava com 401 UNAUTHORIZED_INVALID_JWT_FORMAT
# antes de a função avaliar o x-cron-secret.
[functions.backfill-asaas-customers]
verify_jwt = false

# sync-asaas-ledger: sincroniza o extrato Asaas (ledger) com o financeiro.
# Autentica DENTRO da função por super_admin (Bearer JWT, botão "Sincronizar")
# OU header x-cron-secret == CRON_SECRET (cron pg_cron horário como postgres).
# verify_jwt=false porque o cron manda o secret no x-cron-secret e o CRON_SECRET
# cru no Authorization (não um JWT) — com verify_jwt=true o gateway rejeitava com
# 401 UNAUTHORIZED_INVALID_JWT_FORMAT antes de a função avaliar o x-cron-secret.
[functions.sync-asaas-ledger]
verify_jwt = false

# fisqal-register-company: onboarding fiscal (NFS-e). Authorization Bearer +
# módulo 'nfe' + can_manage_system validados DENTRO da função (gateway não valida
# o JWT pra a função poder traduzir os erros em PT-BR + checar módulo/permissão).
[functions.fisqal-register-company]
verify_jwt = false

# fisqal-upload-certificate: upload do certificado A1 (multipart). Mesmo gate.
[functions.fisqal-upload-certificate]
verify_jwt = false

# fisqal-check-coverage: checa cobertura de NFS-e do município. Mesmo gate.
[functions.fisqal-check-coverage]
verify_jwt = false

# fisqal-emit-nfse (Fase 2.1): emite NFS-e a partir de uma OS. Auth de tenant +
# módulo 'nfe' + can_manage_system validados na própria função (verify_jwt=false
# porque o gate é feito via auth.getUser() com o Bearer do usuário).
[functions.fisqal-emit-nfse]
verify_jwt = false

# fisqal-nfse-status (Fase 2.2): polling de status da emissão. Mesmo gate.
[functions.fisqal-nfse-status]
verify_jwt = false

# fisqal-cancel-nfse (Fase 2.4): cancela uma NFS-e autorizada. Mesmo gate de
# tenant (Authorization Bearer + módulo 'nfe' + can_manage_system).
[functions.fisqal-cancel-nfse]
verify_jwt = false

# fisqal-webhook (Fase 2.3): recepção assíncrona da Fisqal. SEM JWT de usuário —
# segurança é HMAC-SHA256 do corpo cru contra FISQAL_WEBHOOK_SECRET.
[functions.fisqal-webhook]
verify_jwt = false

# fisqal-tax-codes: busca catálogos fiscais (códigos de tributação cTribNac/LC116
# e NBS) via Fisqal. Leitura de catálogo (sem escrita). Mesmo gate de tenant
# (Authorization Bearer + módulo 'nfe' + can_manage_system).
[functions.fisqal-tax-codes]
verify_jwt = false

# time-clock-portal: ponto por link público (/ponto/:slug). Anon por design — o
# funcionário bate o ponto deslogado. Roda com service_role e resolve TUDO pelo
# ponto_slug (+ ponto_enabled). Anti-abuso (rate-limit IP + teto/dia + validação
# de next_action) e isolamento por slug ficam dentro da própria função.
[functions.time-clock-portal]
verify_jwt = false

# Todas as outras funções usam verify_jwt = true (padrão)
# create-user, manage-user, cep-lookup, og-image, os-share, create-company,
# activate-subscription (super_admin), confirm-sale-payment (super_admin)
